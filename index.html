<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>гЃ›гЃ©г‚Љгѓ—гѓ­гѓ„гѓјгѓ«</title>

<style>
:root{
  --bg:#0b0f17;
  --card:rgba(255,255,255,0.05);
  --accent:#4f8cff;
  --text:#e6e9ef;
}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:linear-gradient(#0b0f17,#0f1624);
  color:var(--text);
}
.container{padding:14px;max-width:500px;margin:auto;}
.card{
  background:var(--card);
  backdrop-filter:blur(10px);
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
}
input,textarea,select{
  width:100%;

  color:#fff;
}

}
.row{display:flex;gap:8px}
.row button{flex:1}

/* гѓњг‚їгѓіи‰І */
.amazon{background:#fff;color:#000}
.mercari{background:#ff2e2e;color:#fff}
.btn{background:#4f8cff;color:#fff}
.calc{background:#00c853}
.ai{background:#ff9800}

.result{
  margin-top:10px;
  padding:12px;
  background:#111;
  border-radius:12px;
  text-align:center;
}
.big{font-size:24px;font-weight:bold}

canvas{margin-top:10px;background:#000;border-radius:8px}
</style>
</head>

<body>
<div class="container">

<h2>гЃ›гЃ©г‚Љгѓ—гѓ­гѓ„гѓјгѓ«</h2>

<div class="card">
<input id="keyword" placeholder="е•†е“ЃеђЌ">
<div class="row">
<button class="amazon" onclick="searchAmazon()">Amazon</button>
<button class="mercari" onclick="searchMercari()">гѓЎгѓ«г‚«гѓЄ</button>
</div>
</div>

<div class="card">
<input id="amazon" placeholder="AmazonдѕЎж ј">
<input id="mercari" placeholder="гѓЎгѓ«г‚«гѓЄдѕЎж ј">
<button onclick="autoPrice()">е№іеќ‡дѕЎж ј</button>
<button class="ai" onclick="suggestPrice()">еЈІг‚Њг‚‹дѕЎж јAI</button>
</div>

<div class="card">
<input id="cost" placeholder="д»•е…Ґг‚Њ">
<input id="sell" placeholder="иІ©еЈІдѕЎж ј">
<input id="fee" placeholder="ж‰‹ж•°ж–™%">
<input id="rivals" placeholder="е‡єе“Ѓж•°">
<input id="sold" placeholder="еЈІг‚Њж•°">

<button class="calc" onclick="calc()">е€©з›ЉиЁ€з®—</button>
<button class="ai" onclick="fullAuto()">з·Џеђ€е€¤е®љ</button>

<div id="result" class="result"></div>
<canvas id="chart" width="300" height="150"></canvas>
</div>

<div class="card">
<input id="title" placeholder="е•†е“ЃеђЌ">
<textarea id="desc" placeholder="зЉ¶ж…‹"></textarea>
<select id="platform">
<option>гѓЎгѓ«г‚«гѓЄ</option>
<option>гѓ¤гѓ•г‚Єг‚Ї</option>
</select>
<button onclick="gen()">е‡єе“Ѓж–‡з”џж€ђ</button>
<textarea id="out"></textarea>
</div>

</div>

<script>

// ж¤њзґў
function searchAmazon(){
  let q=document.getElementById("keyword").value;
  window.open("https://www.amazon.co.jp/s?k="+encodeURIComponent(q));
}
function searchMercari(){
  let q=document.getElementById("keyword").value;
  window.open("https://www.mercari.com/jp/search/?keyword="+encodeURIComponent(q));
}

// дѕЎж ј
function autoPrice(){
  let a=+amazon.value,m=+mercari.value;
  if(a&&m)sell.value=Math.floor((a+m)/2);
}

// AIдѕЎж ј
function suggestPrice(){
  let a=+amazon.value||0;
  let m=+mercari.value||0;
  let r=+rivals.value||0;

  let base=Math.min(a||m,m||a);
  let adjust=0.95;

  if(r>50)adjust=0.85;
  else if(r>20)adjust=0.9;

  sell.value=Math.floor(base*adjust);
}

// е€©з›Љ
let priceHistory=[];

function calc(){
  let c=+cost.value,s=+sell.value,f=+fee.value/100;
  if(!c||!s)return;

  let p=s-(s*f)-c;
  let roi=(p/c)*100;

  result.innerHTML=`<div class='big'>${p.toFixed(0)}е††</div>ROI:${roi.toFixed(1)}%`;

  saveProfit(p);
  addPricePoint();
}

// г‚°гѓ©гѓ•
function addPricePoint(){
  let p=+sell.value;
  if(!p)return;

  priceHistory.push(p);
  if(priceHistory.length>20)priceHistory.shift();

  drawChart();
}

function drawChart(){
  let ctx=document.getElementById("chart").getContext("2d");
  ctx.clearRect(0,0,300,150);

  ctx.beginPath();
  priceHistory.forEach((v,i)=>{
    let x=i*(300/20);
    let y=150-(v/Math.max(...priceHistory))*140;
    if(i===0)ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });
  ctx.strokeStyle="#00e676";
  ctx.stroke();
}

// е›ћи»ўзЋ‡
function getRotation(){
  let r=+rivals.value||0;
  let s=+sold.value||0;
  return r? s/r : 0;
}

// з·Џеђ€
function fullAuto(){
  let c=+cost.value,s=+sell.value,f=+fee.value/100;
  let p=s-(s*f)-c;
  let roi=(p/c)*100;
  let rot=getRotation();

  let score=0;
  if(p>2000)score+=30;
  else if(p>1000)score+=20;

  if(roi>40)score+=30;
  else if(roi>20)score+=20;

  if(rot>1)score+=25;
  else if(rot>0.5)score+=15;

  let rank=score>85?"рџ”ҐзҐћ":score>60?"в—Ћ":score>40?"в—‹":"в–і";

  result.innerHTML=`${score}з‚№ ${rank}<br>е›ћи»ў:${rot.toFixed(2)}`;

  ultimateJudge();
}

// жњЂзµ‚е€¤ж–­
function ultimateJudge(){
  let c=+cost.value,s=+sell.value,f=+fee.value/100;
  let p=s-(s*f)-c;
  let roi=(p/c)*100;
  let rot=getRotation();

  let d="NG";
  if(p>1500&&roi>30&&rot>0.5)d="рџ”Ґд»•е…Ґг‚ЊGO";
  else if(p>800)d="в—ЋOK";

  result.innerHTML+=`<br>${d}`;
}

// жњ€ж¬Ў
function saveProfit(p){
  let d=JSON.parse(localStorage.getItem("profit")||"[]");
  let m=new Date().toISOString().slice(0,7);
  d.push({m,p});
  localStorage.setItem("profit",JSON.stringify(d));
}

// е‡єе“Ѓж–‡
function gen(){
  let t=title.value.trim();
  let m=desc.value.trim();
  let pf=platform.value;

  let cond="дё­еЏ¤е“Ѓ";
  if(m.includes("ж–°е“Ѓ"))cond="ж–°е“ЃжњЄдЅїз”Ё";

  let size=m.match(/\d{2,3}cm/);
  let sizeText=size?`г‚µг‚¤г‚є:${size[0]}`:"";

  let tags=t.split(" ").map(x=>"#"+x).join(" ");

  out.value=
`гЂђ${t}гЂ‘

${t}гЃ®е‡єе“ЃгЃ§гЃ™гЂ‚

зЉ¶ж…‹:${cond}

${sizeText}
${m}

еЌіиіје…ҐOK

${pf==="гѓ¤гѓ•г‚Єг‚Ї"?"гѓЋгѓјг‚Їгѓ¬гѓјгѓ гѓЋгѓјгѓЄг‚їгѓјгѓі":""}

${tags}`;
}

</script>
</body>
</html>
